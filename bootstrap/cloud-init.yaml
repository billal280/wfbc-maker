package_update: true
package_upgrade: true

packages:
  - curl
  - git
  - ca-certificates

runcmd:
  - curl -fsSL https://get.docker.com | sh
  - systemctl enable docker
  - systemctl start docker

  - mkdir -p /opt/ai-factory

  - git clone https://github.com/billal280/wfbc-maker /opt/ai-factory

  - chmod +x /opt/ai-factory/bootstrap/install-stack.sh

  - /opt/ai-factory/bootstrap/install-stack.sh