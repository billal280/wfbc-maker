#cloud-config

package_update: true

packages:
  - docker.io
  - docker-compose-plugin
  - git

runcmd:

  - systemctl enable docker

  - systemctl start docker

  - mkdir -p /opt/ai-stack

  - cd /opt/ai-stack

  - curl -o docker-compose.yml https://example.com/docker-compose.yml

  - docker compose up -d